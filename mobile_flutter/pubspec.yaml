filename: saaradhi_go_driver
description: A production-ready ride-hailing driver app for SaaradhiGO.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  animate_do: ^3.3.4
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Networking
  dio: ^5.4.1
  dio_smart_retry: ^6.0.0
  http: ^1.2.0
  http_parser: ^4.0.2

  # Realtime
  socket_io_client: ^2.0.3+1

  # Location & Permissions
  location: ^7.0.0
  geolocator: ^11.0.0
  permission_handler: ^12.0.1

  # Storage
  shared_preferences: ^2.2.2

  # File & Media
  image_picker: ^1.2.1
  url_launcher: ^6.2.5

  # Utilities
  intl: ^0.19.0
  file_picker: ^10.3.10
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

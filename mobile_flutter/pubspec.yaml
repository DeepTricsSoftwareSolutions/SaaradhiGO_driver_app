name: saaradhi_go_driver
description: A production-ready ride-hailing driver app for SaaradhiGO.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  animate_do: ^5.1.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  fl_chart: ^1.2.0

  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  # Networking
  dio: ^5.4.1
  dio_smart_retry: ^7.0.1
  http: ^1.2.0
  http_parser: ^4.0.2

  # Realtime
  web_socket_channel: ^3.0.1

  # Location & Permissions
  location: ^8.0.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Storage
  shared_preferences: ^2.2.2

  # File & Media
  image_picker: ^1.2.1
  url_launcher: ^6.2.5

  # Utilities
  intl: ^0.20.2
  file_picker: ^11.0.2
  flutter_background_service: ^5.1.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

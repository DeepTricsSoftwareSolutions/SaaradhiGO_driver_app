<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: radial-gradient(circle at center, transparent 0%, #061425 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface overflow-hidden antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#061425] bg-gradient-to-b from-[#0F1C2E] to-transparent">
<div class="flex items-center gap-4">
<button class="text-[#F2CA50] hover:bg-[#1E2A3D] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-[#F2CA50] font-headline font-bold text-xl tracking-wider">SaaradhiGO</h1>
</div>
<div class="flex items-center gap-3">
<div class="flex flex-col items-end mr-2">
<span class="text-[10px] font-bold uppercase tracking-widest text-[#D6E3FC]/60 font-label">Today's Earnings</span>
<span class="text-[#F2CA50] font-headline font-extrabold text-lg leading-tight">₹1,458.50</span>
</div>
<div class="w-10 h-10 rounded-full border-2 border-primary-container overflow-hidden">
<img alt="Driver Profile" class="w-full h-full object-cover" data-alt="Professional driver profile picture looking confident" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9S5wqMyK2TQGzNDVIXRJS_FzUT2QmPpMAOt5creCLDJHV_ro0ZAXUJu1CtcHvxIK39AGc-Pg6Lga8zJSuaavNNfJBDbUllBx-fZGfBic4bDLtpCRpgzyUzcCE20IIVs0yCnfsD6SSIwF7am33WCuzXrfQQSo2calsACJBSqNc4UUYfckCrPQRZBQcKJPVwZ9KbK3Leaw-KaJO6x4ZyzxnyVw_nk3gb7ET1oAQlZB6r0Ki0M4cFzqVlvUfpqa500KyhlE7KYU36-g"/>
</div>
</div>
</header>
<!-- Map Canvas (Full Screen) -->
<main class="fixed inset-0 z-0">
<div class="absolute inset-0 grayscale contrast-125 brightness-[0.4]">
<img class="w-full h-full object-cover" data-alt="Dark themed stylized city street map" data-location="Hyderabad" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZu7ky2oq6lVtd30KoEierKj6qt5tl53KJ2XJ5R5NHHHqNNSufuOFKZf1DmE20bU6sCD049KkPrJkIzn3V2OSrQ-fNfLsabAdKNYmHmLo-XZvNQTrG_Ski3tdWWi7Ki47r-rIMKSrx1rWLIBQgdDRvFvZ74cbylhW0plnIUiUgP7nCXKqzGM-vI4wAWT-FgRIcR1tuxcqXL1zlMJlLBABU7mlI5iANGJOxFKwuNwWm0hYT5lzyUA9paTDZbxBznT8w48PlJ0Osnm4"/>
</div>
<div class="absolute inset-0 map-gradient-overlay opacity-60"></div>
<!-- Pulse Animation for Car Location -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="relative flex items-center justify-center">
<div class="absolute w-12 h-12 bg-primary/20 rounded-full animate-ping"></div>
<div class="absolute w-8 h-8 bg-primary/40 rounded-full"></div>
<div class="relative z-10 w-4 h-4 bg-primary rounded-full border-2 border-on-primary"></div>
</div>
</div>
</main>
<!-- Floating Actions -->
<div class="fixed right-6 bottom-52 flex flex-col gap-4 z-40">
<button class="w-12 h-12 rounded-full bg-surface-container-highest backdrop-blur-xl flex items-center justify-center text-on-surface shadow-[0_-4px_48px_0_rgba(214,227,252,0.08)] hover:bg-surface-bright transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-14 h-14 rounded-full bg-error-container text-error flex items-center justify-center shadow-2xl shadow-black/50 border border-error/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined font-bold text-2xl" data-icon="emergency">emergency</span>
</button>
</div>
<!-- Bottom Dashboard Sheet -->
<section class="fixed bottom-0 left-0 w-full z-50 bg-[#0F1C2E]/90 backdrop-blur-xl rounded-t-[2.5rem] px-6 pt-4 pb-8 shadow-[0_-8px_64px_0_rgba(0,0,0,0.5)]">
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full mx-auto mb-6"></div>
<!-- Status & Stats Row -->
<div class="flex justify-between items-end mb-8">
<div class="space-y-1">
<div class="flex items-center gap-2">
<span class="w-2.5 h-2.5 rounded-full bg-error animate-pulse"></span>
<span class="text-on-surface-variant font-label font-bold text-xs uppercase tracking-tighter">Current Status</span>
</div>
<h2 class="text-on-surface font-headline font-extrabold text-2xl tracking-tight italic">Offline</h2>
</div>
<div class="flex gap-4">
<div class="text-right">
<p class="text-on-surface-variant font-label font-bold text-[10px] uppercase tracking-widest">Trips</p>
<p class="text-on-surface font-headline font-bold text-xl">12</p>
</div>
<div class="text-right">
<p class="text-on-surface-variant font-label font-bold text-[10px] uppercase tracking-widest">Online</p>
<p class="text-on-surface font-headline font-bold text-xl">4.5h</p>
</div>
</div>
</div>
<!-- Main Action Toggle -->
<button class="group w-full h-20 bg-gradient-to-r from-primary to-primary-container rounded-2xl flex items-center justify-center gap-4 active:scale-[0.97] transition-all duration-200 relative overflow-hidden">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-on-primary text-3xl font-bold" data-icon="power_settings_new">power_settings_new</span>
<span class="text-on-primary font-headline font-extrabold text-xl uppercase tracking-widest">GO ONLINE</span>
</button>
<!-- Secondary Info Cards (Bento Style) -->
<div class="grid grid-cols-2 gap-3 mt-4">
<div class="bg-surface-container-high/50 p-4 rounded-2xl border border-outline-variant/10">
<span class="material-symbols-outlined text-primary mb-2" data-icon="local_gas_station">local_gas_station</span>
<p class="text-[10px] text-on-surface-variant font-bold uppercase">Estimated Fuel</p>
<p class="text-sm font-bold">65% Full</p>
</div>
<div class="bg-surface-container-high/50 p-4 rounded-2xl border border-outline-variant/10">
<span class="material-symbols-outlined text-primary mb-2" data-icon="verified">verified</span>
<p class="text-[10px] text-on-surface-variant font-bold uppercase">Rating</p>
<p class="text-sm font-bold">4.98 ★</p>
</div>
</div>
</section>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-[60] flex justify-around items-center px-4 pb-6 pt-3 bg-[#0F1C2E]/95 backdrop-blur-2xl rounded-t-[1.5rem] shadow-[0_-4px_48px_0_rgba(214,227,252,0.08)]">
<a class="flex flex-col items-center justify-center text-[#F2CA50] bg-[#293548]/50 rounded-xl py-1 px-3 active:scale-97 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#D6E3FC]/40 hover:text-[#F2CA50] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Earnings</span>
</a>
<a class="flex flex-col items-center justify-center text-[#D6E3FC]/40 hover:text-[#F2CA50] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Wallet</span>
</a>
<a class="flex flex-col items-center justify-center text-[#D6E3FC]/40 hover:text-[#F2CA50] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Account</span>
</a>
</nav>

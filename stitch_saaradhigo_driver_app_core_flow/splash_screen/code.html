<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#0f1c2e",
              "surface-container": "#132032",
              "on-secondary-container": "#9fbae6",
              "surface-bright": "#2d3a4d",
              "surface": "#061425",
              "on-secondary-fixed": "#001c3b",
              "on-primary": "#3c2f00",
              "background": "#061425",
              "primary-fixed-dim": "#e9c349",
              "outline": "#99907c",
              "on-primary-fixed": "#241a00",
              "tertiary-fixed-dim": "#b4c5ff",
              "on-secondary-fixed-variant": "#2d486d",
              "secondary-fixed-dim": "#adc8f5",
              "tertiary-container": "#97b0ff",
              "on-primary-fixed-variant": "#574500",
              "tertiary": "#bfcdff",
              "primary": "#f2ca50",
              "inverse-primary": "#735c00",
              "surface-container-highest": "#293548",
              "secondary-container": "#2f4a70",
              "on-tertiary-fixed": "#00174b",
              "outline-variant": "#4d4635",
              "on-secondary": "#133155",
              "error": "#ffb4ab",
              "tertiary-fixed": "#dbe1ff",
              "surface-container-high": "#1e2a3d",
              "on-primary-container": "#554300",
              "inverse-surface": "#d6e3fc",
              "secondary-fixed": "#d5e3ff",
              "primary-fixed": "#ffe088",
              "on-error": "#690005",
              "secondary": "#adc8f5",
              "on-background": "#d6e3fc",
              "on-tertiary": "#082b72",
              "on-tertiary-fixed-variant": "#27438a",
              "surface-variant": "#293548",
              "on-error-container": "#ffdad6",
              "surface-container-lowest": "#020e20",
              "error-container": "#93000a",
              "on-surface": "#d6e3fc",
              "on-surface-variant": "#d0c5af",
              "surface-dim": "#061425",
              "primary-container": "#d4af37",
              "surface-tint": "#e9c349",
              "on-tertiary-container": "#254188",
              "inverse-on-surface": "#243144"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gold-gradient-text {
            background: linear-gradient(135deg, #f2ca50 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .obsidian-radial {
            background: radial-gradient(circle at center, #0f1c2e 0%, #061425 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased">
<!-- Splash Screen Container (390x844 simulated layout) -->
<main class="relative flex flex-col items-center justify-center min-h-screen obsidian-radial overflow-hidden">
<!-- Abstract Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<!-- Center Branding Content -->
<div class="relative z-10 flex flex-col items-center space-y-8">
<!-- Logo Icon (Abstract representation of a driver/shield) -->
<div class="w-24 h-24 bg-gradient-to-br from-primary to-primary-container rounded-[2rem] flex items-center justify-center shadow-[0_0_40px_rgba(242,202,80,0.15)] transform rotate-12">
<span class="material-symbols-outlined text-on-primary text-5xl transform -rotate-12" style="font-variation-settings: 'FILL' 1;">
                    shield_with_heart
                </span>
</div>
<!-- Brand Name -->
<div class="flex flex-col items-center space-y-2">
<h1 class="text-4xl font-headline font-extrabold tracking-widest gold-gradient-text">
                    SaaradhiGO
                </h1>
<p class="text-on-surface-variant font-label text-[10px] uppercase tracking-[0.4em]">
                    Premium Captain Experience
                </p>
</div>
</div>
<!-- Footer / Loading Indicator Area -->
<div class="absolute bottom-24 flex flex-col items-center space-y-6 w-full px-12">
<!-- Minimalist Loading Track -->
<div class="w-48 h-[2px] bg-surface-container-highest overflow-hidden rounded-full">
<!-- Inner Progress Bar -->
<div class="w-1/3 h-full bg-primary shadow-[0_0_12px_rgba(242,202,80,0.4)]"></div>
</div>
<!-- Subtle Status Text -->
<span class="text-on-secondary-container/50 font-label text-[10px] tracking-widest uppercase">
                Initializing System
            </span>
</div>
<!-- Regulatory/Small Print (Asymmetric Positioning) -->
<div class="absolute bottom-10 right-8">
<span class="text-on-surface/20 text-[8px] tracking-tight font-medium">
                V 2.4.0-GOLD
            </span>
</div>
</main>
<!-- Visual Polish Elements -->
<div class="fixed inset-0 pointer-events-none border-[12px] border-surface z-50 rounded-[3rem]"></div>
</body></html>

</div>
</div>

</div>
<div class="flex-1">

</div>
</div>
</div>

</button>
<button class="w-12 h-12 rounded-xl bg-surface-container-high border border-outline-variant/15 flex items-center justify-center text-primary shadow-xl">
<span class="material-symbols-outlined">layers</span>

</div>
<div class="flex gap-2">

</div>

<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container rounded-2xl flex items-center justify-center gap-3 active:scale-[0.97] transition-transform duration-200 group">

<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
</div>
</div>
</main>

<div class="flex flex-col items-center justify-center text-[#F2CA50] bg-[#293548]/50 rounded-xl py-1 px-3">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-['Inter'] font-bold text-[10px] uppercase tracking-widest mt-1">Home</span>

<div class="flex flex-col items-center justify-center text-[#D6E3FC]/40">

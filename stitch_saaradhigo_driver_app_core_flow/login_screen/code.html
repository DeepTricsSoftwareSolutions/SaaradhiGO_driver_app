<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=390, height=844, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#0f1c2e",
              "surface-container": "#132032",
              "on-secondary-container": "#9fbae6",
              "surface-bright": "#2d3a4d",
              "surface": "#061425",
              "on-secondary-fixed": "#001c3b",
              "on-primary": "#3c2f00",
              "background": "#061425",
              "primary-fixed-dim": "#e9c349",
              "outline": "#99907c",
              "on-primary-fixed": "#241a00",
              "tertiary-fixed-dim": "#b4c5ff",
              "on-secondary-fixed-variant": "#2d486d",
              "secondary-fixed-dim": "#adc8f5",
              "tertiary-container": "#97b0ff",
              "on-primary-fixed-variant": "#574500",
              "tertiary": "#bfcdff",
              "primary": "#f2ca50",
              "inverse-primary": "#735c00",
              "surface-container-highest": "#293548",
              "secondary-container": "#2f4a70",
              "on-tertiary-fixed": "#00174b",
              "outline-variant": "#4d4635",
              "on-secondary": "#133155",
              "error": "#ffb4ab",
              "tertiary-fixed": "#dbe1ff",
              "surface-container-high": "#1e2a3d",
              "on-primary-container": "#554300",
              "inverse-surface": "#d6e3fc",
              "secondary-fixed": "#d5e3ff",
              "primary-fixed": "#ffe088",
              "on-error": "#690005",
              "secondary": "#adc8f5",
              "on-background": "#d6e3fc",
              "on-tertiary": "#082b72",
              "on-tertiary-fixed-variant": "#27438a",
              "surface-variant": "#293548",
              "on-error-container": "#ffdad6",
              "surface-container-lowest": "#020e20",
              "error-container": "#93000a",
              "on-surface": "#d6e3fc",
              "on-surface-variant": "#d0c5af",
              "surface-dim": "#061425",
              "primary-container": "#d4af37",
              "surface-tint": "#e9c349",
              "on-tertiary-container": "#254188",
              "inverse-on-surface": "#243144"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .glass-effect {
            background: rgba(41, 53, 72, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Status Bar Spacer (Mobile Emulation) -->
<div class="h-12 w-full flex items-center justify-between px-6 opacity-40">
<span class="text-xs font-semibold">9:41</span>
<div class="flex gap-1.5">
<span class="material-symbols-outlined text-[14px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_full</span>
</div>
</div>
<main class="flex flex-col h-full max-w-[390px] mx-auto px-8 pt-12">
<!-- Brand Identity Section -->
<header class="mb-16">
<div class="mb-8">
<span class="text-primary font-headline font-bold text-2xl tracking-wider">SaaradhiGO</span>
</div>
<h1 class="font-headline text-[32px] leading-tight font-extrabold text-on-surface mb-2 tracking-tight">
                Welcome back,<br/>Captain
            </h1>
<p class="text-on-secondary-container font-medium opacity-80">Enter your phone number to start your shift.</p>
</header>
<!-- Form Section -->
<div class="space-y-10">
<!-- Input Group -->
<div class="space-y-4">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-bold">
                    Mobile Number
                </label>
<div class="flex items-center gap-3">
<!-- Country Code Picker (Glassmorphic) -->
<div class="glass-effect flex items-center gap-2 px-4 py-4 rounded-xl border border-outline-variant/10 cursor-pointer active:scale-95 transition-transform">
<span class="text-on-surface font-semibold text-base">+91</span>
<span class="material-symbols-outlined text-primary text-sm">keyboard_arrow_down</span>
</div>
<!-- Phone Input Field -->
<div class="flex-1 relative">
<input class="w-full bg-surface-container-high border-none text-on-surface font-semibold text-lg py-4 px-5 rounded-xl placeholder:text-on-surface/20 focus:ring-2 focus:ring-primary/40 focus:bg-surface-bright transition-all" placeholder="98765 43210" type="tel"/>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="space-y-6">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-[0_4px_48px_0_rgba(242,202,80,0.12)] active:scale-[0.97] transition-all flex items-center justify-center gap-2">
<span>Continue</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Divider Alternative (Asymmetric Spacing) -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant/30"></div>
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">OR</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant/30"></div>
</div>
<!-- Secondary Action -->
<button class="w-full bg-surface-container-high/50 border border-outline-variant/10 text-on-surface font-semibold py-4 rounded-xl hover:bg-surface-bright active:scale-[0.97] transition-all">
                    Register as Partner
                </button>
</div>
</div>
<!-- Footer / Legal Section -->
<footer class="mt-auto pb-12 text-center space-y-4">
<p class="text-xs text-on-surface-variant leading-relaxed">
                By continuing, you agree to SaaradhiGO’s <br/>
<a class="text-primary-fixed-dim underline underline-offset-4 decoration-primary/30" href="#">Terms of Service</a> &amp; 
                <a class="text-primary-fixed-dim underline underline-offset-4 decoration-primary/30" href="#">Privacy Policy</a>
</p>
</footer>
</main>
<!-- Decorative Background Elements (Obsidian Command Center Aesthetic) -->
<div class="fixed top-0 right-0 -z-10 w-[300px] h-[300px] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[200px] h-[200px] bg-secondary/5 blur-[100px] rounded-full"></div>
<!-- Floating Asymmetric Accents -->
<div class="fixed top-24 -left-4 w-1 h-24 bg-gradient-to-b from-primary/40 to-transparent rounded-full opacity-30"></div>
</body></html>

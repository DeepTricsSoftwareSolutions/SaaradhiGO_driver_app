version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: saaradhigo
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: saaradhi_db
    ports:
      - "5432:5432"

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"

# To run: docker-compose up -d

<!DOCTYPE html>

<html class="dark"><head>

              "surface-container-low": "#0f1c2e",

              "secondary": "#adc8f5",

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-container {
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Top App Bar (Shared Component) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-gradient-to-b from-[#0F1C2E] to-transparent">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#D4AF37]" data-icon="menu">menu</span>
<h1 class="font-headline font-bold text-xl tracking-wider text-[#F2CA50]">SaaradhiGO</h1>
</div>
<div class="w-10 h-10 rounded-full border-2 border-primary/20 bg-surface-container overflow-hidden">
<img alt="Driver Profile" class="w-full h-full object-cover" data-alt="Close up of a professional driver headshot" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcxBa6FEcva_R3sfy19_-5tg2P0n0j_Ogz_UzRTPmHkI-NHZV_7xC9Wo9zSj7Y6nqQ2D7I-CxjJeUt5V9r1treSwJXkCOk1J3MEjcfXfQ3PLbNKwQKP52Gq_-uDq9AIQdxMRA8HO7NSPF08pr9Zce75sI7HtXU137hwWBj36HK_e8lnN4KM4hLYIqZjcovMnuALmvUvKMyxc-Y-CnCR3h7DYRfk6kFnK87p7Bdp0ayJUqYimqXaiX7S-Me5uu7tEgERbgdqbXhCYU"/>
</div>
</header>
<!-- Main Content Canvas (Map Layer) -->
<main class="relative h-screen w-full pt-16">
<!-- Background Map -->
<div class="absolute inset-0 z-0 map-container">
<img alt="Dark Night Map" class="w-full h-full object-cover grayscale brightness-[0.3] contrast-[1.2]" data-alt="Dark stylized urban map showing city streets at night" data-location="Hyderabad" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQ8t1je9lJFjxL-cerEjDRkoJO-p_-4XL_1z3DdGXDT08QS54qGpQnrWQGGtU6945t5L4g_HQb0aLLMAJw0AnEiuU_VgSEzaeJffsGnBy1yiSq9kZ8_3SzAA5ddFzK_hPaosYA6Q97JjocdMafI96zVHEshNfHPIh484U1LR6gZFAVBQe_t-6LDwc_OGnDOr6Q6pQ1qowWr2KEiSDpyR6WIUJm9bs8BCCXqMQ0vFK4ic9Ep253JYHgKHr5CkmhFewuwotyE9EJYcc"/>
<!-- Map Markers / Active Route -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="relative">
<div class="absolute -inset-4 bg-primary/20 rounded-full animate-pulse"></div>
<span class="material-symbols-outlined text-primary text-4xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
</div>
<!-- SOS Button (Prominent on Map) -->
<button class="absolute top-24 right-6 z-20 w-14 h-14 bg-error-container rounded-full shadow-[0_4px_48px_0_rgba(147,0,10,0.4)] flex items-center justify-center border border-error/30 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-error font-bold text-3xl" data-icon="emergency">emergency</span>
</button>
<!-- Navigation Tooltip on Map -->
<div class="absolute top-24 left-6 z-20 bg-surface-container-high/80 backdrop-blur-xl p-3 rounded-xl border border-outline-variant/15 flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="near_me">near_me</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Pick-up Location</p>
<p class="text-sm font-semibold">Jubilee Hills, Road No. 36</p>
</div>
</div>
<!-- Bottom Sheet (Ride Start Details) -->
<section class="fixed bottom-0 left-0 w-full z-40 bg-surface-container-low rounded-t-[2.5rem] shadow-[0_-8px_64px_rgba(0,0,0,0.6)] px-6 pt-2 pb-10 border-t border-outline-variant/10">
<!-- Handle Bar -->
<div class="flex justify-center mb-6">
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Passenger Info Card -->
<div class="flex items-center justify-between mb-8">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Rahul K." class="w-16 h-16 rounded-2xl object-cover bg-surface-container-highest" data-alt="Portrait of a young male passenger" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRZ7cib5HQwdeN-tpESp6efj-egiSHSLBvict7jHej-1ojgTNTKBx8Khuks9Z9SVVSZpIa0eK48zYHAK83BXDEif3oDJicASKKT4lUjdej_vJTQV-2DQb_R5HYYIMB0t_Zo1uK8_0ewwXXQQCRtvx2VyImA5F8bGaKsBbj4RZKS4F2LDgGtA4YhcnjKgHHqyb4eFM0bXL0907iENDcxjefJnTYnByDKVyVU8uhM128R_VnT2I9HrezilRqcYctKPtTG1lhDThfUhs"/>
<div class="absolute -bottom-1 -right-1 bg-primary px-1.5 py-0.5 rounded-md flex items-center gap-0.5">
<span class="text-[10px] font-bold text-on-primary">4.9</span>
<span class="material-symbols-outlined text-[10px] text-on-primary" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<div>
<h2 class="font-headline text-xl font-bold tracking-tight">Rahul K.</h2>
<div class="flex items-center gap-2 mt-1">
<span class="text-xs font-medium text-on-surface-variant bg-surface-container-highest px-2 py-0.5 rounded text-primary">Gold Member</span>
</div>
</div>
</div>
<div class="flex gap-2">
<button class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center text-on-surface border border-outline-variant/10 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
</button>
<button class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center text-on-surface border border-outline-variant/10 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="call">call</span>
</button>
</div>
</div>
<!-- OTP Input Section -->
<div class="mb-8">
<div class="flex justify-between items-center mb-4">
<p class="text-sm font-semibold text-on-surface-variant">Enter Ride Start OTP</p>
<button class="text-xs font-bold text-primary uppercase tracking-widest">Resend OTP</button>
</div>
<div class="grid grid-cols-4 gap-4">
<input class="w-full aspect-square text-center text-2xl font-bold rounded-2xl bg-surface-container-highest border-0 ring-2 ring-primary focus:ring-primary shadow-inner" maxlength="1" type="text" value="4"/>
<input class="w-full aspect-square text-center text-2xl font-bold rounded-2xl bg-surface-container-highest border-0 ring-1 ring-outline-variant/20 focus:ring-primary shadow-inner" maxlength="1" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold rounded-2xl bg-surface-container-highest border-0 ring-1 ring-outline-variant/20 focus:ring-primary shadow-inner" maxlength="1" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold rounded-2xl bg-surface-container-highest border-0 ring-1 ring-outline-variant/20 focus:ring-primary shadow-inner" maxlength="1" type="text"/>
</div>
</div>
<!-- Start Trip Action -->
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all group">
<span class="font-headline font-extrabold text-lg text-on-primary tracking-widest">START TRIP</span>
<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Ride Details Footer -->
<div class="mt-6 pt-6 border-t border-outline-variant/5 flex justify-between items-center text-on-surface-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span>
<span class="text-xs font-medium">8.4 km • 22 mins</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="payments">payments</span>
<span class="text-xs font-medium">₹248.50 (Cash)</span>
</div>
</div>
</section>
</main>
<!-- Navigation Shell Suppressed as per Task Intent (Focused Transactional Journey) -->
</body></html>
